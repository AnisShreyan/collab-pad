version: "3.9"

services:
  server:
    build: ./server
    restart: unless-stopped
    environment:
      PORT: 4000
      MONGO_URI: ${MONGO_URI:-mongodb+srv://userx:JmCJTUaBOkUoU2n2@cltr.vmt89t0.mongodb.net/}
      JWT_SECRET: ${JWT_SECRET:-your_jwt_secret_here}
      CLIENT_ORIGIN: ${CLIENT_ORIGIN:-http://collabpad.duckdns.org}
    # No ports exposed directly, handled by nginx

  client:
    build:
      context: ./client
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://collabpad.duckdns.org}
        - NEXT_PUBLIC_SOCKET_URL=${NEXT_PUBLIC_SOCKET_URL:-http://collabpad.duckdns.org}
    restart: unless-stopped
    depends_on: [server]
    # No ports exposed directly, handled by nginx

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    depends_on:
      - client
      - server

  certbot:
    image: certbot/certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

volumes:
  certbot_conf:
  certbot_www:
