version: "3.9"

services:
  server:
    build: ./server
    restart: unless-stopped
    environment:
      PORT: 4000
      MONGO_URI: ${MONGO_URI:-mongodb+srv://userx:JmCJTUaBOkUoU2n2@cltr.vmt89t0.mongodb.net/}
      JWT_SECRET: ${JWT_SECRET:-your_jwt_secret_here}
      CLIENT_ORIGIN: ${CLIENT_ORIGIN:-https://collabpad.duckdns.org}

  client:
    build:
      context: ./client
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-https://collabpad.duckdns.org}
        - NEXT_PUBLIC_SOCKET_URL=${NEXT_PUBLIC_SOCKET_URL:-https://collabpad.duckdns.org}
    restart: unless-stopped
    depends_on: [server]

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - client
      - server
